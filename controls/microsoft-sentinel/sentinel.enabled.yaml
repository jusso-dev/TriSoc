apiVersion: attestor.trisoc.io/v1
kind: Control
metadata:
  id: microsoft.sentinel.enabled
  title: Microsoft Sentinel is enabled on the intended workspace
  vendor: microsoft
  product: sentinel
  service: onboarding
  version: 1.0.0
  status: active
  tags: [foundational, architecture]
spec:
  classification: vendor_required
  severity: critical
  scopes: [workspace]
  source:
    title: Onboard Microsoft Sentinel
    url: https://learn.microsoft.com/en-us/azure/sentinel/quickstart-onboard
    retrievedAt: 2026-07-14T00:00:00Z
    contentHash: sha256:af46cc329fce88abc43f81b4f3bdef761007d42aad644d625acd8f99e9cbd144
  requiredPermissions: [Microsoft.SecurityInsights/onboardingStates/read]
  expected: {sentinelEnabled: true}
  collector: {provider: microsoft, operation: sentinel.onboardingStates.list}
  evaluator: {type: cel, expression: "evidence.sentinelEnabled == true"}
  explanation:
    technical: The target Log Analytics workspace has no Microsoft Sentinel onboarding state resource, so Sentinel capabilities are not active on that workspace.
    plainEnglish: Microsoft Sentinel is not enabled on the workspace intended to hold security data, so its detections and incident workflow cannot operate there.
  remediation:
    risk: medium
    automatic: generate_iac
    planGenerator: microsoft.sentinel.onboarding
    guidance: Review and deploy the generated onboardingStates Bicep extension resource against the intended workspace, then run a targeted validation scan.
    costImpact: usage_dependent
    destructive: false
  evidence: {requiredFields: [workspaceResourceId, sentinelEnabled]}
  maximumEvidenceAge: 24h
