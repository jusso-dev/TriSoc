name: trisoc-attestor
services:
  postgres:
    image: postgres:17.7-bookworm@sha256:86e0b703649d7a792bd9243ee28afc9d8f7c6b2b5638077c9d6882d4d472bbfd
    restart: unless-stopped
    environment:
      POSTGRES_DB: attestor
      POSTGRES_USER: attestor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/000001_initial.up.sql:/docker-entrypoint-initdb.d/000001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attestor -d attestor"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    security_opt:
      - no-new-privileges:true

  attestor:
    build:
      context: .
    restart: unless-stopped
    environment:
      TRISOC_CONTROL_DIR: /app/controls
      # Container networking requires a wildcard bind; the published port remains loopback-only.
      TRISOC_MCP_CONTAINER_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${TRISOC_MCP_PORT:-8787}:8787"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
