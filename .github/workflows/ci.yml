name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal providers)"
      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...
      - name: Static analysis
        run: go vet ./...
      - name: Validate bundled controls
        run: go run ./cmd/trisoc controls validate controls --output json
      - name: Validate combined SIEM implementation gate
        run: |
          go run ./cmd/trisoc siem check \
            --log-sources examples/log-source-inventory.yaml \
            --maturity examples/soc-maturity-assessment.yaml \
            --at 2026-07-16T08:00:00Z \
            --output json
      - name: Validate AWS CloudFormation
        run: |
          pipx install cfn-lint==1.53.0
          go run ./cmd/trisoc aws plan --trail-name trisoc-organization-trail --output cloudformation > generated-aws-plan.json
          cfn-lint \
            deploy/cloudformation/aws-attestor-assessment-role.yaml \
            deploy/cloudformation/aws-security-operations-baseline.yaml \
            generated-aws-plan.json
      - name: Validate Microsoft Sentinel Bicep
        run: az bicep build --file deploy/bicep/microsoft-sentinel/main.bicep --outfile /tmp/trisoc-microsoft-sentinel.json
      - name: Validate Google Security Operations Terraform
        run: |
          docker run --rm \
            --volume "$PWD/deploy/terraform/google-secops:/workspace" \
            --workdir /workspace \
            hashicorp/terraform:1.15.8 fmt -check
          docker run --rm \
            --volume "$PWD/deploy/terraform/google-secops:/workspace" \
            --workdir /workspace \
            hashicorp/terraform:1.15.8 init -backend=false -lockfile=readonly
          docker run --rm \
            --volume "$PWD/deploy/terraform/google-secops:/workspace" \
            --workdir /workspace \
            hashicorp/terraform:1.15.8 validate
      - name: Validate Compose
        run: docker compose config --quiet
      - name: Build container
        run: docker build --tag trisoc-attestor:ci .

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Pinned to the verified post-incident commit, never a mutable release tag.
      - name: Scan dependencies, secrets, and IaC
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialise CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: go
      - name: Analyse
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
